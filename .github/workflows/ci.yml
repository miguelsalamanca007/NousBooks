name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: test & build ───────────────────────────────────────────────────
  backend:
    name: Backend — test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Build JAR
        run: ./mvnw package -DskipTests

  # ── Frontend: lint & build ──────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # NEXT_PUBLIC_API_URL is read from .env.production (committed to the repo),
        # so no extra env var is needed here.
        run: npm run build
