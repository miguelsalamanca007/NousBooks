# Dev profile: H2 in-memory database, started fresh on every boot.
# MODE=PostgreSQL makes H2 accept Postgres-ish SQL so our migrations
# stay portable between dev (H2) and prod (real Postgres).
spring.datasource.url=jdbc:h2:mem:nousbooks;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
