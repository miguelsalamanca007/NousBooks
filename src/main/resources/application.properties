spring.application.name=nousbooks

# Default to the dev profile when none is set explicitly.
# Override in production with SPRING_PROFILES_ACTIVE=prod
spring.profiles.default=dev

# Flyway owns the schema. Hibernate just validates that the
# entity classes match what Flyway built.
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
