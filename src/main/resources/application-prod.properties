# Prod profile: real Postgres. Credentials must come from environment variables.
# On Render, set:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:<port>/<db>
#   SPRING_DATASOURCE_USERNAME=<user>
#   SPRING_DATASOURCE_PASSWORD=<password>
#   SPRING_PROFILES_ACTIVE=prod
#   FRONTEND_URL=https://your-app.vercel.app
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# In prod we don't want to dump every SQL statement to the logs.
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO

# CORS — supports patterns, e.g. https://*.vercel.app or exact URL.
# Set FRONTEND_URL in Render env vars.
app.cors.allowed-origins=${FRONTEND_URL:https://*.vercel.app}
