# Test profile: H2 in-memory DB, Flyway disabled, Hibernate creates the schema
# directly. This lets @SpringBootTest run without Postgres or Flyway migrations.
spring.datasource.url=jdbc:h2:mem:nousbooks-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1qdW5pdC10ZXN0cy1uZWVkcy0zMi1ieXRlcy1taW4=
app.jwt.expiration-ms=3600000
app.google-books.api-key=test-key
app.google-oauth.client-id=test-client-id
app.cors.allowed-origins=http://localhost:3000
